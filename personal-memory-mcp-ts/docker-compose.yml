services:
  documentdb:
    image: ghcr.io/documentdb/documentdb/documentdb-local:latest
    ports:
      - "127.0.0.1:10260:10260"
    volumes:
      - documentdb-data:/data/db
    environment:
      - USERNAME=admin
      - PASSWORD=documentdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "9712"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  documentdb-data:
